<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Vault - ログイン</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 40px 36px;
    width: 360px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo h1 {
    font-size: 22px;
    font-weight: 700;
    color: #e6edf3;
  }
  .logo p {
    font-size: 13px;
    color: #8b949e;
    margin-top: 4px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 6px;
  }
  input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus {
    border-color: #388bfd;
  }
  .error {
    color: #f85149;
    font-size: 13px;
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 6px;
  }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #2ea043; }
  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    margin-top: 0;
    padding: 11px;
    background: #fff;
    color: #24292f;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
  }
  .google-btn:hover { background: #f6f8fa; }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 22px 0 18px;
    color: #6e7681;
    font-size: 12px;
  }
  .divider::before,
  .divider::after {
    content: "";
    height: 1px;
    background: #30363d;
    flex: 1;
  }
  .password-form.collapsed { display: none; }
  .password-toggle {
    margin-top: 16px;
    text-align: center;
    color: #8b949e;
    font-size: 12px;
    cursor: pointer;
  }
  .password-toggle:hover { color: #c9d1d9; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <h1>Prompt Vault</h1>
    <p>プロンプト管理ツール</p>
  </div>
  {% if google_enabled %}
  <a class="google-btn" href="/auth/google">
    <span>G</span>
    <span>Googleでログイン</span>
  </a>
  <div class="divider">または</div>
  {% endif %}
  <form method="POST" action="/login" class="password-form{% if google_enabled and not error %} collapsed{% endif %}" id="password-form">
    <label for="password">パスワード</label>
    <input type="password" id="password" name="password" autofocus placeholder="パスワードを入力">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <button type="submit">ログイン</button>
  </form>
  {% if google_enabled %}
  <div class="password-toggle" onclick="document.getElementById('password-form').classList.toggle('collapsed')">
    パスワードでログイン
  </div>
  {% endif %}
</div>
</body>
</html>
