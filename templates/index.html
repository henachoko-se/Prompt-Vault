<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Vault</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
  :root {
    --sidebar-w: 260px;
    --accent: #e8621a;
    --accent-light: #fff4ee;
    --header-h: 56px;
    --footer-h: 60px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f7f8fa; height: 100vh; overflow: hidden; }

  /* ヘッダー */
  #header {
    position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
    background: #1e1e2e; color: #fff; display: flex; align-items: center;
    padding: 0 16px; gap: 12px; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  #header .logo { font-weight: 700; font-size: 18px; color: #ff8c42; }
  #header .spacer { flex: 1; }
  #github-badge {
    font-size: 12px; padding: 4px 10px; border-radius: 12px; cursor: pointer;
    background: #2a2a3e; border: 1px solid #444; color: #aaa;
    display: flex; align-items: center; gap: 6px;
  }
  #github-badge.connected { border-color: #3fb950; color: #3fb950; }
  #github-badge:hover { background: #333; }

  /* サイドバー */
  #sidebar {
    position: fixed; top: var(--header-h); left: 0; bottom: var(--footer-h);
    width: var(--sidebar-w); background: #fff; border-right: 1px solid #e5e7eb;
    overflow-y: auto; padding: 8px 0;
  }
  .folder-header {
    padding: 6px 14px; font-size: 11px; font-weight: 700; color: #9ca3af;
    text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px;
  }
  .file-item {
    padding: 7px 14px 7px 28px; font-size: 13px; cursor: pointer; color: #374151;
    display: flex; align-items: center; gap: 8px; border-radius: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: background .15s;
  }
  .file-item:hover { background: #f3f4f6; }
  .file-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
  .file-item .badge-unsaved {
    margin-left: auto; width: 7px; height: 7px; background: var(--accent);
    border-radius: 50%; flex-shrink: 0;
  }
  #btn-new-file {
    margin: 8px 12px; display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border: 1px dashed #d1d5db; border-radius: 6px;
    font-size: 12px; color: #6b7280; cursor: pointer; background: none;
    width: calc(100% - 24px);
  }
  #btn-new-file:hover { background: #f9fafb; border-color: var(--accent); color: var(--accent); }

  /* メインエリア */
  #main {
    position: fixed; top: var(--header-h); left: var(--sidebar-w); right: 0;
    bottom: var(--footer-h); display: flex; flex-direction: column; overflow: hidden;
  }
  #file-title-bar {
    padding: 10px 20px; background: #fff; border-bottom: 1px solid #e5e7eb;
    display: flex; align-items: center; gap: 10px;
  }
  #file-title { font-size: 15px; font-weight: 600; color: #1f2937; }
  #file-path { font-size: 12px; color: #9ca3af; }

  /* タブ */
  .nav-tabs { padding: 0 20px; background: #fff; border-bottom: 1px solid #e5e7eb; }
  .nav-tabs .nav-link { font-size: 13px; color: #6b7280; border: none; padding: 8px 16px; }
  .nav-tabs .nav-link.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: 600; }
  .nav-tabs .nav-link:hover { color: var(--accent); background: none; }

  /* コンテンツ */
  #content-area { flex: 1; overflow-y: auto; padding: 20px; }

  /* Markdownビュー */
  #view-pane { max-width: 820px; margin: 0 auto; }
  #view-pane h1 { font-size: 22px; border-bottom: 2px solid #e5e7eb; padding-bottom: 8px; margin-bottom: 16px; }
  #view-pane h2 { font-size: 17px; margin-top: 24px; }
  #view-pane h3 { font-size: 15px; margin-top: 20px; }
  #view-pane code { background: #f3f4f6; padding: 2px 5px; border-radius: 3px; font-size: 12px; }
  #view-pane pre { background: #1e1e2e; color: #d4d4d4; padding: 14px; border-radius: 8px; font-size: 12px; overflow-x: auto; }
  #view-pane pre code { background: none; color: inherit; padding: 0; }
  #view-pane blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: #6b7280; }
  #view-pane table { border-collapse: collapse; width: 100%; margin: 12px 0; }
  #view-pane th { background: #f3f4f6; padding: 8px 12px; border: 1px solid #e5e7eb; text-align: left; font-size: 13px; }
  #view-pane td { padding: 7px 12px; border: 1px solid #e5e7eb; font-size: 13px; }
  #view-pane tr:nth-child(even) { background: #fafafa; }

  /* 編集ペイン */
  #edit-textarea {
    width: 100%; height: calc(100vh - var(--header-h) - var(--footer-h) - 120px);
    font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 13px;
    border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px;
    resize: none; outline: none; line-height: 1.6;
    background: #fafafa;
  }
  #edit-textarea:focus { border-color: var(--accent); background: #fff; }

  /* 履歴ペイン */
  .history-item {
    display: flex; align-items: flex-start; gap: 12px; padding: 12px 0;
    border-bottom: 1px solid #f3f4f6; cursor: pointer;
  }
  .history-item:hover { background: #fafafa; margin: 0 -8px; padding-left: 8px; padding-right: 8px; border-radius: 8px; }
  .history-hash { font-family: monospace; font-size: 11px; background: #e5e7eb; padding: 2px 7px; border-radius: 4px; color: #374151; flex-shrink: 0; }
  .history-msg { font-size: 13px; color: #1f2937; font-weight: 500; }
  .history-date { font-size: 11px; color: #9ca3af; }
  .restore-btn { margin-left: auto; font-size: 11px; flex-shrink: 0; }

  /* 差分ペイン */
  #diff-pane { font-family: 'Cascadia Code', monospace; font-size: 12px; line-height: 1.7; }
  .diff-add { background: #e6ffed; color: #1a7f37; padding: 1px 8px; display: block; }
  .diff-del { background: #ffebe9; color: #cf222e; padding: 1px 8px; display: block; }
  .diff-hunk { background: #ddf4ff; color: #0969da; padding: 1px 8px; display: block; font-weight: 600; }
  .diff-ctx { padding: 1px 8px; display: block; color: #57606a; }
  .diff-meta { color: #9ca3af; padding: 1px 8px; display: block; font-size: 11px; }
  #diff-selector { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }

  /* フッター */
  #footer {
    position: fixed; bottom: 0; left: 0; right: 0; height: var(--footer-h);
    background: #fff; border-top: 1px solid #e5e7eb;
    display: flex; align-items: center; padding: 0 16px; gap: 10px;
  }
  #commit-input {
    flex: 1; border: 1px solid #e5e7eb; border-radius: 6px; padding: 7px 12px;
    font-size: 13px; outline: none;
  }
  #commit-input:focus { border-color: var(--accent); }
  #commit-input::placeholder { color: #9ca3af; }
  .btn-save { background: var(--accent); color: #fff; border: none; padding: 7px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-save:hover { background: #d4520f; }
  .btn-gh { padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; gap: 5px; }
  .btn-push { background: #2da44e; color: #fff; }
  .btn-push:hover { background: #218839; }
  .btn-pull { background: #0969da; color: #fff; }
  .btn-pull:hover { background: #0753b6; }
  #changes-badge { font-size: 12px; color: #6b7280; white-space: nowrap; }

  /* ウェルカム画面 */
  #welcome { text-align: center; padding: 80px 20px; color: #9ca3af; }
  #welcome h2 { font-size: 32px; margin-bottom: 12px; }
  #welcome p { font-size: 15px; }

  /* トースト */
  #toast-area { position: fixed; top: 70px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast-msg {
    padding: 10px 16px; border-radius: 8px; font-size: 13px; color: #fff;
    box-shadow: 0 4px 12px rgba(0,0,0,.2); animation: slideIn .2s ease;
    max-width: 340px;
  }
  .toast-msg.success { background: #2da44e; }
  .toast-msg.error { background: #cf222e; }
  .toast-msg.info { background: #0969da; }
  @keyframes slideIn { from { opacity:0; transform: translateX(40px); } to { opacity:1; transform: translateX(0); } }

  /* モーダル調整 */
  .modal-header { background: #1e1e2e; color: #fff; }
  .modal-header .btn-close { filter: invert(1); }
</style>
</head>
<body>

<!-- ヘッダー -->
<div id="header">
  <i class="bi bi-box-seam-fill" style="font-size:20px;color:#ff8c42;"></i>
  <span class="logo">Prompt Vault</span>
  <span class="spacer"></span>
  <div id="changes-badge"></div>
  <div id="github-badge" onclick="openGithubModal()">
    <i class="bi bi-github"></i>
    <span id="github-status-text">GitHub 未設定</span>
  </div>
  <button class="btn btn-sm" style="background:#2a2a3e;color:#aaa;border:1px solid #444;" onclick="openGithubModal()">
    <i class="bi bi-gear"></i>
  </button>
</div>

<!-- サイドバー -->
<div id="sidebar">
  <button id="btn-new-file" onclick="openNewFileModal()">
    <i class="bi bi-plus-lg"></i> 新規プロンプト
  </button>
  <div id="file-tree"></div>
</div>

<!-- メインエリア -->
<div id="main">
  <div id="file-title-bar" style="display:none;">
    <i class="bi bi-file-earmark-text" style="color:var(--accent);"></i>
    <span id="file-title"></span>
    <span id="file-path"></span>
    <span id="unsaved-indicator" style="display:none;color:var(--accent);font-size:12px;margin-left:4px;">● 未保存</span>
  </div>

  <ul class="nav nav-tabs" id="main-tabs" style="display:none;">
    <li class="nav-item"><a class="nav-link active" href="#" onclick="switchTab('view',this)"><i class="bi bi-eye me-1"></i>表示</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('edit',this)"><i class="bi bi-pencil me-1"></i>編集</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('history',this)"><i class="bi bi-clock-history me-1"></i>履歴</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="switchTab('diff',this)"><i class="bi bi-file-diff me-1"></i>差分</a></li>
  </ul>

  <div id="content-area">
    <!-- ウェルカム -->
    <div id="welcome">
      <div style="font-size:64px;margin-bottom:16px;">📦</div>
      <h2 style="color:#1e1e2e;">Prompt Vault</h2>
      <p>左のサイドバーからプロンプトを選んでください</p>
      <p style="font-size:13px;margin-top:8px;">新規作成は「新規プロンプト」ボタンから</p>
    </div>

    <!-- 表示ペイン -->
    <div id="view-pane" style="display:none;"></div>

    <!-- 編集ペイン -->
    <div id="edit-pane" style="display:none;">
      <textarea id="edit-textarea" oninput="markUnsaved()" spellcheck="false"></textarea>
    </div>

    <!-- 履歴ペイン -->
    <div id="history-pane" style="display:none;">
      <div style="max-width:700px;margin:0 auto;">
        <div id="history-list"></div>
      </div>
    </div>

    <!-- 差分ペイン -->
    <div id="diff-pane-wrap" style="display:none;">
      <div style="max-width:900px;margin:0 auto;">
        <div id="diff-selector">
          <span style="font-size:13px;color:#6b7280;">比較:</span>
          <select id="diff-v1" class="form-select form-select-sm" style="width:160px;">
            <option value="">最新との差分</option>
          </select>
          <span style="font-size:13px;color:#6b7280;">↔</span>
          <select id="diff-v2" class="form-select form-select-sm" style="width:160px;">
            <option value="HEAD">現在（HEAD）</option>
          </select>
          <button class="btn btn-sm btn-outline-secondary" onclick="loadDiff()">表示</button>
        </div>
        <div id="diff-pane"></div>
      </div>
    </div>
  </div>
</div>

<!-- フッター -->
<div id="footer">
  <input type="text" id="commit-input" placeholder="変更のコメントを入力（例: Q3に複数キャラ対応を追加）" onkeydown="if(event.key==='Enter')commitChanges()">
  <button class="btn-save" onclick="commitChanges()"><i class="bi bi-floppy me-1"></i>保存</button>
  <button class="btn-gh btn-push" onclick="githubPush()"><i class="bi bi-cloud-upload me-1"></i>Push</button>
  <button class="btn-gh btn-pull" onclick="githubPull()"><i class="bi bi-cloud-download me-1"></i>Pull</button>
</div>

<!-- トーストエリア -->
<div id="toast-area"></div>

<!-- GitHub設定モーダル -->
<div class="modal fade" id="githubModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-github me-2"></i>GitHub 連携設定</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-bold">リポジトリURL</label>
          <input type="text" id="gh-url" class="form-control" placeholder="https://github.com/ユーザー名/prompt_vault">
          <div class="form-text">GitHubで作成したリポジトリのURLを入力してください</div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Personal Access Token（PAT）</label>
          <div class="input-group">
            <input type="password" id="gh-token" class="form-control" placeholder="ghp_xxxxxxxxxxxx">
            <button class="btn btn-outline-secondary" type="button" onclick="toggleTokenVisibility()"><i class="bi bi-eye" id="token-eye"></i></button>
          </div>
          <div class="form-text">
            GitHub → Settings → Developer settings → Personal access tokens → Generate new token<br>
            スコープ: <code>repo</code> にチェック
          </div>
        </div>
        <div id="gh-current-remote" class="alert alert-secondary" style="font-size:12px;display:none;"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
        <button type="button" class="btn" style="background:var(--accent);color:#fff;" onclick="saveGithubConfig()">
          <i class="bi bi-save me-1"></i>保存
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 新規ファイルモーダル -->
<div class="modal fade" id="newFileModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">新規プロンプト作成</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">フォルダ</label>
          <select id="new-folder" class="form-select">
            <option value="">ルート</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">ファイル名</label>
          <input type="text" id="new-filename" class="form-control" placeholder="my_prompt（.md自動付加）">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
        <button type="button" class="btn" style="background:var(--accent);color:#fff;" onclick="createNewFile()">作成</button>
      </div>
    </div>
  </div>
</div>

<!-- 履歴プレビューモーダル -->
<div class="modal fade" id="restoreModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="restore-title">バージョンプレビュー</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <pre id="restore-preview" style="max-height:400px;overflow-y:auto;font-size:12px;background:#f3f4f6;padding:14px;border-radius:8px;"></pre>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
        <button type="button" class="btn btn-warning" id="restore-confirm-btn">
          <i class="bi bi-arrow-counterclockwise me-1"></i>このバージョンに戻す
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let currentFile = null;
let currentTab = 'view';
let isUnsaved = false;
let fileTree = [];

// ── 初期化 ─────────────────────────────────────────────────────────
window.onload = async () => {
  await loadFileTree();
  await loadGithubStatus();
  await loadStatus();
};

// ── ファイルツリー ──────────────────────────────────────────────────
async function loadFileTree() {
  const res = await fetch('/api/files');
  fileTree = await res.json();
  const container = document.getElementById('file-tree');
  container.innerHTML = '';

  // 新規ファイルモーダルのフォルダ選択肢を更新
  const sel = document.getElementById('new-folder');
  sel.innerHTML = '<option value="">ルート</option>';

  fileTree.forEach(group => {
    if (group.folder) {
      const header = document.createElement('div');
      header.className = 'folder-header';
      header.innerHTML = `<i class="bi bi-folder2"></i>${group.folder}`;
      container.appendChild(header);

      const opt = document.createElement('option');
      opt.value = group.folder; opt.textContent = group.folder;
      sel.appendChild(opt);
    }
    group.files.forEach(fname => {
      const path = group.folder ? `${group.folder}/${fname}` : fname;
      const item = document.createElement('div');
      item.className = 'file-item';
      item.id = `file-${path.replace(/[\/\.]/g,'_')}`;
      item.innerHTML = `<i class="bi bi-file-earmark-text" style="font-size:13px;color:#9ca3af;"></i>${fname}`;
      item.onclick = () => openFile(path);
      container.appendChild(item);
    });
  });
}

// ── ファイルを開く ──────────────────────────────────────────────────
async function openFile(path) {
  if (isUnsaved && currentFile) {
    if (!confirm('未保存の変更があります。破棄しますか？')) return;
  }
  currentFile = path;
  isUnsaved = false;

  // サイドバーのアクティブ状態
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`file-${path.replace(/[\/\.]/g,'_')}`);
  if (el) el.classList.add('active');

  // タイトルバー
  const parts = path.split('/');
  document.getElementById('file-title').textContent = parts[parts.length - 1];
  document.getElementById('file-path').textContent = parts.length > 1 ? parts.slice(0,-1).join('/') + '/' : '';
  document.getElementById('file-title-bar').style.display = 'flex';
  document.getElementById('main-tabs').style.display = 'flex';
  document.getElementById('unsaved-indicator').style.display = 'none';

  // コンテンツ読み込み
  const res = await fetch(`/api/content?path=${encodeURIComponent(path)}`);
  const data = await res.json();

  document.getElementById('edit-textarea').value = data.content || '';
  document.getElementById('welcome').style.display = 'none';

  // 現在のタブで表示
  if (currentTab === 'view') renderView(data.content);
  else if (currentTab === 'history') loadHistory();
  else if (currentTab === 'diff') loadDiff();
  else renderEdit(data.content);
}

// ── タブ切り替え ────────────────────────────────────────────────────
function switchTab(tab, el) {
  event.preventDefault();
  currentTab = tab;
  document.querySelectorAll('#main-tabs .nav-link').forEach(a => a.classList.remove('active'));
  el.classList.add('active');

  ['view-pane','edit-pane','history-pane','diff-pane-wrap'].forEach(id =>
    document.getElementById(id).style.display = 'none'
  );

  if (tab === 'view') { document.getElementById('view-pane').style.display = 'block'; renderView(document.getElementById('edit-textarea').value); }
  else if (tab === 'edit') { document.getElementById('edit-pane').style.display = 'block'; }
  else if (tab === 'history') { document.getElementById('history-pane').style.display = 'block'; loadHistory(); }
  else if (tab === 'diff') { document.getElementById('diff-pane-wrap').style.display = 'block'; loadDiff(); }
}

// ── Markdownレンダリング ────────────────────────────────────────────
function renderView(content) {
  document.getElementById('view-pane').innerHTML = marked.parse(content || '');
}
function renderEdit(content) {
  document.getElementById('edit-pane').style.display = 'block';
}

// ── 未保存フラグ ────────────────────────────────────────────────────
function markUnsaved() {
  if (!isUnsaved) {
    isUnsaved = true;
    document.getElementById('unsaved-indicator').style.display = 'inline';
  }
  // Ctrl+S でファイルに書き込み
}

// ── Ctrl+S で自動保存（ファイルへの書き込み）──────────────────────
document.addEventListener('keydown', async (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (!currentFile) return;
    const content = document.getElementById('edit-textarea').value;
    await fetch('/api/content', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path: currentFile, content})
    });
    isUnsaved = false;
    document.getElementById('unsaved-indicator').style.display = 'none';
    showToast('ファイルを保存しました（Ctrl+S）', 'success');
    await loadStatus();
  }
});

// ── ステータス確認 ──────────────────────────────────────────────────
async function loadStatus() {
  const res = await fetch('/api/status');
  const data = await res.json();
  const badge = document.getElementById('changes-badge');
  if (data.changes.length > 0) {
    badge.innerHTML = `<span style="color:#ff8c42;"><i class="bi bi-circle-fill" style="font-size:8px;"></i> ${data.changes.length}件の未コミット変更</span>`;
  } else {
    badge.innerHTML = '';
  }
}

// ── コミット（保存） ────────────────────────────────────────────────
async function commitChanges() {
  // 編集中なら先にファイル保存
  if (currentFile && currentTab === 'edit') {
    const content = document.getElementById('edit-textarea').value;
    await fetch('/api/content', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path: currentFile, content})
    });
    isUnsaved = false;
    document.getElementById('unsaved-indicator').style.display = 'none';
  }

  const msg = document.getElementById('commit-input').value.trim();
  if (!msg) { showToast('コメントを入力してください', 'error'); return; }

  const res = await fetch('/api/commit', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({message: msg})
  });
  const data = await res.json();
  if (data.ok) {
    showToast(`✅ 保存しました！ [${data.hash}] ${data.message}`, 'success');
    document.getElementById('commit-input').value = '';
    await loadStatus();
    // 履歴タブにいる場合は更新
    if (currentTab === 'history') loadHistory();
  } else {
    showToast(data.error || '保存に失敗しました', 'error');
  }
}

// ── 履歴読み込み ────────────────────────────────────────────────────
async function loadHistory() {
  const res = await fetch(`/api/history?path=${encodeURIComponent(currentFile || '')}`);
  const data = await res.json();
  const container = document.getElementById('history-list');

  if (!data.history.length) {
    container.innerHTML = '<div style="color:#9ca3af;text-align:center;padding:40px;">まだ保存履歴がありません</div>';
    return;
  }

  // 差分タブのセレクトも更新
  const v1sel = document.getElementById('diff-v1');
  v1sel.innerHTML = '<option value="">最新との差分</option>';

  container.innerHTML = data.history.map((h, i) => `
    <div class="history-item">
      <span class="history-hash">${h.hash}</span>
      <div>
        <div class="history-msg">${escHtml(h.message)}</div>
        <div class="history-date">${h.date}</div>
      </div>
      <button class="btn btn-sm btn-outline-secondary restore-btn" onclick="previewRestore('${h.full_hash}','${escHtml(h.message)}')">
        <i class="bi bi-eye me-1"></i>見る
      </button>
    </div>
  `).join('');

  data.history.forEach(h => {
    const opt = document.createElement('option');
    opt.value = h.full_hash; opt.textContent = `${h.hash} ${h.date} ${h.message}`;
    v1sel.appendChild(opt);
  });
}

// ── バージョンプレビュー & 復元 ─────────────────────────────────────
async function previewRestore(hash, msg) {
  const res = await fetch(`/api/restore?path=${encodeURIComponent(currentFile)}&version=${hash}`);
  const data = await res.json();
  if (data.error) { showToast(data.error, 'error'); return; }

  document.getElementById('restore-title').textContent = `バージョン: ${hash.substring(0,7)} - ${msg}`;
  document.getElementById('restore-preview').textContent = data.content;
  document.getElementById('restore-confirm-btn').onclick = () => doRestore(hash, msg);
  new bootstrap.Modal(document.getElementById('restoreModal')).show();
}

async function doRestore(hash, msg) {
  const res = await fetch('/api/restore', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({path: currentFile, version: hash})
  });
  const data = await res.json();
  if (data.ok) {
    showToast(`バージョン ${hash.substring(0,7)} に戻しました`, 'info');
    bootstrap.Modal.getInstance(document.getElementById('restoreModal')).hide();
    await openFile(currentFile);
    await loadStatus();
  } else {
    showToast(data.error, 'error');
  }
}

// ── 差分表示 ────────────────────────────────────────────────────────
async function loadDiff() {
  const v1 = document.getElementById('diff-v1').value;
  const v2 = document.getElementById('diff-v2').value;
  const url = `/api/diff?path=${encodeURIComponent(currentFile || '')}&v1=${v1}&v2=${v2 === 'HEAD' ? '' : v2}`;
  const res = await fetch(url);
  const data = await res.json();
  const pane = document.getElementById('diff-pane');

  if (!data.diff || data.diff.length === 0) {
    pane.innerHTML = '<div style="color:#9ca3af;text-align:center;padding:40px;">差分がありません</div>';
    return;
  }

  pane.innerHTML = data.diff.map(line => {
    const cls = {add:'diff-add',del:'diff-del',hunk:'diff-hunk',meta:'diff-meta',ctx:'diff-ctx'}[line.type] || 'diff-ctx';
    const prefix = {add:'+',del:'-',hunk:'',meta:'',ctx:' '}[line.type] || ' ';
    return `<span class="${cls}">${prefix}${escHtml(line.text)}</span>`;
  }).join('');
}

// ── 新規ファイル作成 ────────────────────────────────────────────────
function openNewFileModal() {
  document.getElementById('new-filename').value = '';
  new bootstrap.Modal(document.getElementById('newFileModal')).show();
}

async function createNewFile() {
  const folder = document.getElementById('new-folder').value;
  const name = document.getElementById('new-filename').value.trim();
  if (!name) { showToast('ファイル名を入力してください', 'error'); return; }

  const res = await fetch('/api/new', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({folder, name})
  });
  const data = await res.json();
  if (data.ok) {
    bootstrap.Modal.getInstance(document.getElementById('newFileModal')).hide();
    await loadFileTree();
    await openFile(data.path);
    switchTab('edit', document.querySelector('#main-tabs .nav-link:nth-child(2)'));
    showToast(`${name} を作成しました`, 'success');
  } else {
    showToast(data.error, 'error');
  }
}

// ── GitHub 設定 ─────────────────────────────────────────────────────
async function loadGithubStatus() {
  const res = await fetch('/api/github/status');
  const data = await res.json();
  const badge = document.getElementById('github-badge');
  const text = document.getElementById('github-status-text');
  if (data.connected) {
    badge.classList.add('connected');
    const url = data.remote.replace(/https:\/\/[^@]+@/, 'https://');
    text.textContent = url.replace('https://github.com/', '').split(' ')[0];
  } else {
    badge.classList.remove('connected');
    text.textContent = 'GitHub 未設定';
  }
}

async function openGithubModal() {
  const res = await fetch('/api/github/config');
  const cfg = await res.json();
  document.getElementById('gh-url').value = cfg.github_url || '';
  document.getElementById('gh-token').value = '';
  document.getElementById('gh-token').placeholder = cfg.has_token ? '（設定済み。変更する場合のみ入力）' : 'ghp_xxxxxxxxxxxx';

  const remoteDiv = document.getElementById('gh-current-remote');
  const st = await fetch('/api/github/status').then(r=>r.json());
  if (st.remote) {
    remoteDiv.style.display = 'block';
    remoteDiv.textContent = '現在のリモート: ' + st.remote.replace(/https:\/\/[^@]+@/, 'https://');
  } else {
    remoteDiv.style.display = 'none';
  }

  new bootstrap.Modal(document.getElementById('githubModal')).show();
}

function toggleTokenVisibility() {
  const inp = document.getElementById('gh-token');
  const icon = document.getElementById('token-eye');
  if (inp.type === 'password') {
    inp.type = 'text'; icon.className = 'bi bi-eye-slash';
  } else {
    inp.type = 'password'; icon.className = 'bi bi-eye';
  }
}

async function saveGithubConfig() {
  const url = document.getElementById('gh-url').value.trim();
  const token = document.getElementById('gh-token').value.trim();
  const body = {github_url: url};
  if (token) body.github_token = token;

  const res = await fetch('/api/github/config', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.ok) {
    bootstrap.Modal.getInstance(document.getElementById('githubModal')).hide();
    await loadGithubStatus();
    showToast('GitHub設定を保存しました', 'success');
  } else {
    showToast(data.error || 'エラーが発生しました', 'error');
  }
}

// ── GitHub Push / Pull ──────────────────────────────────────────────
async function githubPush() {
  showToast('GitHubに送信中...', 'info');
  const res = await fetch('/api/github/push', {method:'POST'});
  const data = await res.json();
  if (data.ok) {
    showToast(data.message || 'Push完了！', 'success');
  } else {
    showToast('Push失敗: ' + (data.error || '不明なエラー'), 'error');
  }
}

async function githubPull() {
  showToast('GitHubから取得中...', 'info');
  const res = await fetch('/api/github/pull', {method:'POST'});
  const data = await res.json();
  if (data.ok) {
    showToast('Pull完了: ' + data.message, 'success');
    if (currentFile) await openFile(currentFile);
    await loadFileTree();
  } else {
    showToast('Pull失敗: ' + (data.error || '不明なエラー'), 'error');
  }
}

// ── ユーティリティ ──────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg, type='info') {
  const area = document.getElementById('toast-area');
  const el = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.textContent = msg;
  area.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3000);
}
</script>
