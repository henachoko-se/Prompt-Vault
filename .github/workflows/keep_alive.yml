name: Keep Alive

on:
  schedule:
    # 10分おきにping（UTC基準）
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://prompt-vault-8ljo.onrender.com/ping)
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: ping returned $STATUS"
          fi
