#
# タイトル：「また何もできなかった」は、脳の嘘だった
# ページ数：3ページ（各4コマ）
# 見開き：左綴じ・横書き（左上→右下読み）
# 方向性：共感（Before）→ 転換（対話）→ ほっこり（After）
#
# ----- ページ1：Before -----
# コマ1（左上・横ブチ抜き）: 夜のオフィス街遠景。「夜11時」のテキスト。場面転換コマ
# コマ2（右上・中）: デスクでスマホを見るへなP。「また何もできなかった……」
# コマ3（左下・中）: スマホに同僚の成果SNSが映る。「ぶかPへのフィードバックも後回し……」
# コマ4（右下・大・タチキリ）: 机に突っ伏す or 天を仰ぐへなP。頭上に黒モヤ。「（自分、今日も何やってたんだろう）」
#
# ----- ページ2：AI壁打ち対話 -----
# コマ1（左上・中）: スマホでAI壁打ちプロンプトを起動。「……試してみるか」
# コマ2（右上・中・変形コマ）: AIの最初の問いかけ「今日はどんな1日でしたか？」。面食らうへなP
# コマ3（左下・大）: ぽつりと答えるへなP。「ぶかPの相談に……5分だけど、乗った」。右下インサートにぶかPのシーン
# コマ4（右下・中・変形コマ）: AIが承認「そうなんですね。ぶかPさんの相談に時間を作れていたんですね。それ、意外と難しいことだと思います」。ハッとするへなP
#
# ----- ページ3：After -----
# コマ1（左上・中）: AIの深掘り「迷ったけど、どんなふうに時間を作ったんですか？」
# コマ2（右上・中）: 思い出すへなP「ミーティング前の5分……調整したんだった」
# コマ3（左下・大・飛び出し）: 「あなたが今日やれていたこと」リストが表示。驚いたへなPが枠から飛び出す
# コマ4（右下・大・タチキリ）: 布団でほっこり笑顔のへなP。「……やれてた、じゃん」。キラキラ温かい光
#
# ================================================================
# 【画像生成AI用 YAML】各ページを別コードブロックでStep2に貼り付け
# ================================================================

